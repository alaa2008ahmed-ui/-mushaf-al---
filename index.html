
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- <script type="text/javascript" charset="utf-8" src="cordova.js"></script> -->
    <!-- Font Awesome is now imported locally in index.css -->
    <script>
        if (!window.cordova) {
            window.cordova = { exec: function() {}, require: function() {}, platformId: 'browser' };
            if (!navigator.app) {
                navigator.app = { exitApp: function() { if (window.close) window.close(); } };
            }
        }
        document.addEventListener('deviceready', function() { console.log('Device ready - Cordova initialized'); }, false);
    </script>
    

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "path": "https://esm.sh/path@^0.12.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
<script>
    (function() {
        function isInstalledAppMode() {
            if (typeof window.cordova !== 'undefined') return true;
            if (window.navigator && window.navigator.standalone) return true;
            if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
            return false;
        }
        document.addEventListener('DOMContentLoaded', function() {
            if (!isInstalledAppMode()) return;
            try { document.body.classList.add('no-select'); } catch (e) {}
            document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
            document.addEventListener('selectstart', function(e){ e.preventDefault(); });
        });
    })();
</script>
</head>
<body>
    <video id="video-background" autoplay muted loop playsinline preload="auto" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: none;"></video>
    <div id="root"></div>
    <div id="theme-modal-root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
