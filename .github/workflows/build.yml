name: Build Official Release APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android

      # --- حل مشكلة تصاريح Vite ---
      - name: Fix Vite Permissions
        run: chmod +x node_modules/.bin/vite

      - name: Build web project
        run: npm run build
        
      - name: Sync with Capacitor
        run: npx cap sync android

      # --- فك تشفير مفتاح التوقيع ---
      - name: Prepare Keystore File
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_CONTENT }}" | base64 -d > android/app/release.keystore

      # --- بناء النسخة الرسمية الموقعة ---
      - name: Build Signed Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      # --- إعادة تسمية الملف بالاسم الذي تريده ---
      - name: Rename APK File
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk "android/app/build/outputs/apk/release/مصحف أحمد وليلى.apk"

      # --- رفع الملف النهائي لـ GitHub ---
      - name: Upload Official APK
        uses: actions/upload-artifact@v4
        with:
          name: Mushaf-Official-Release
          path: "android/app/build/outputs/apk/release/*.apk"